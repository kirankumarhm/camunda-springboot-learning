spring:
  datasource:
    url: jdbc:h2:file:./camunda-h2-database
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

camunda:
  bpm:
    admin-user:
      id: demo
      password: demo
    filter:
      create: All tasks
    history-level: full
    generic-properties:
      properties:
        historyTimeToLive: P5D
    job-execution:
      enabled: true
      deployment-aware: false
    metrics:
      enabled: true
    webapp:
      index-redirect-enabled: true

server:
  port: 8080
  host: 0.0.0.0
